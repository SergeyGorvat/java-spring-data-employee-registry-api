spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/employee_register
    username: postgres
    password: gorvat

  data:
    jdbc:
      dialect: postgresql

      security:
        oauth2:
          client:
            registration:
              google:
                client-id: ${GOOGLE_CLIENT_ID}
                client-secret: ${GOOGLE_CLIENT_SECRET}
                scope: profile,email
                redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'

server:
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: password
    key-store-type: PKCS12
    key-alias: mykey
  port: 8443
